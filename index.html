<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Library</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card fade-in">
<section >
<h2>1. Basic Buttons</h2> <div class="basic">
<button class="btn btn-primary">Primary</button>
<button class="btn btn-secondary">Secondary</button>
<button class="btn btn-danger">Danger</button>
<button class="btn btn-light">Light</button>
<button class="btn btn-dark">Dark</button> </div>
</section>
</div>

<div class="card fade-in">
<section >
<h2>2. Outline Buttons</h2>
<button class="btn btn-outline btn-outline-primary">Primary</button>
<button class="btn btn-outline btn-outline-secondary">Secondary</button>
<button class="btn btn-outline btn-outline-danger">Danger</button>
<button class="btn btn-outline btn-outline-light">Light</button>
<button class="btn btn-outline btn-outline-dark">Dark</button>
</section>
</div>

<div class="card fade-in">
<section>
<h2>3. Glow Buttons</h2>
<button class="btn btn-glow glow-blue">Glow Blue</button>
<button class="btn btn-glow glow-red">Glow Red</button>
<button class="btn btn-glow glow-green">Glow Green</button>
<button class="btn btn-glow glow-purple">Glow Purple</button>
<button class="btn btn-glow glow-white">Glow White</button>
</section>
</div>

<div class="card fade-in">
<section>
<h2>4. Rounded Buttons</h2>
<button class="btn btn-primary btn-rounded">Primary</button>
<button class="btn btn-secondary btn-rounded">Secondary</button>
<button class="btn btn-danger btn-rounded">Danger</button>
<button class="btn btn-light btn-rounded">Light</button>
<button class="btn btn-dark btn-rounded">Dark</button>
</section>
</div>

<div class="card fade-in">
<section>
<h2>5. Gradient Buttons</h2>
<button class="btn btn-gradient gradient-1">Gradient 1</button>
<button class="btn btn-gradient gradient-2">Gradient 2</button>
<button class="btn btn-gradient gradient-3">Gradient 3</button>
<button class="btn btn-gradient gradient-4">Gradient 4</button>
<button class="btn btn-gradient gradient-5">Gradient 5</button>
<button class="btn-neon">Neon Glow</button>
<button class="btn-glass">Frosted Glas</button>
</section>
</div>

<div class="card fade-in">
<section>
<h2>6. Animated Buttons</h2>
<button class="btn-pulse ">Pulse</button>
<button class="btn-3d">3D Press</button>
<button class="btn-rotate">⚙️</button>
</section>
</div>

<footer>
    <p>© Gaurav Neermul 2026</p>
</footer>
</body>
</html>
